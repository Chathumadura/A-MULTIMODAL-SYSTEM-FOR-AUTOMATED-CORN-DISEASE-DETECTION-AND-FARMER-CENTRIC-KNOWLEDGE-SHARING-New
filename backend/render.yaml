# render.yaml – Render deployment manifest
# Docs: https://render.com/docs/yaml-spec

services:
  - type: web
    name: corn-ai-backend
    env: python
    region: oregon          # change to "frankfurt" or "singapore" as needed
    plan: free              # upgrade to "starter" or higher for production

    # ── Source ──────────────────────────────────────────────────────────────
    # All build / start commands run with backend/ as the working directory.
    rootDir: backend

    # ── Build ────────────────────────────────────────────────────────────────
    # Step 1 – install Python dependencies
    # Step 2 – download the large model binaries from cloud storage.
    #   Set TF_MODEL_URL and YIELD_MODEL_URL on the Render dashboard.
    #   The script is idempotent: it skips files that are already valid.
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python scripts/download_models.py

    # ── Start ────────────────────────────────────────────────────────────────
    # $PORT is injected automatically by Render at runtime.
    # Use "python -m uvicorn" so Python's own module runner is used instead of
    # the shell-path "uvicorn" binary, which may not be on PATH (exit 127).
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT

    # ── Health check ─────────────────────────────────────────────────────────
    # Render polls this after every deploy; a non-200 fails the rollout.
    # The /health body now includes tf_diagnostics for instant diagnosis.
    healthCheckPath: /health

    # ── Environment variables ────────────────────────────────────────────────
    envVars:
      # CORS – comma-separated list of allowed origins, or "*" for open dev.
      - key: ALLOWED_ORIGINS
        value: "*"

      # ── Model paths (relative to backend/; resolved via BASE_DIR in config.py)
      - key: TF_MODEL_PATH
        value: models/corn_final_model.tflite
      - key: PEST_MODEL_PATH
        value: models/pest_model.tflite
      - key: YIELD_MODEL_PATH
        value: models/corn_yield_model.tflite
      - key: DISEASE_MODEL_PATH
        value: models/disease_model.tflite

      # ── Model download URLs ──────────────────────────────────────────────────
      # IMPORTANT: do NOT use value: "" here – Render would push that empty
      # string to the service on every deploy, overwriting any URL you set on
      # the dashboard.  Use sync: false so that the URL lives only on the
      # dashboard (Environment tab) and is never clobbered by this file.
      #
      # On the Render dashboard go to Environment and set:
      #   TF_MODEL_URL      → direct download URL for corn_final_model.tflite
      #   PEST_MODEL_URL    → direct download URL for pest_model.tflite
      #   YIELD_MODEL_URL   → direct download URL for models/corn_yield_model.tflite
      #   DISEASE_MODEL_URL → direct download URL for disease_model.tflite
      #
      # Supported sources: any public HTTPS URL, Google Drive share link
      # (auto-rewritten to direct download), Dropbox (?dl=0 → ?dl=1),
      # Hugging Face resolve URL.  Leave unset to skip download (affected
      # endpoints will return HTTP 503).
      - key: TF_MODEL_URL
        sync: false   # real URL must be set in Render dashboard → Environment tab
      - key: PEST_MODEL_URL
        sync: false   # real URL must be set in Render dashboard → Environment tab
      - key: YIELD_MODEL_URL
        sync: false   # real URL must be set in Render dashboard → Environment tab
      - key: DISEASE_MODEL_URL
        sync: false   # real URL must be set in Render dashboard → Environment tab
