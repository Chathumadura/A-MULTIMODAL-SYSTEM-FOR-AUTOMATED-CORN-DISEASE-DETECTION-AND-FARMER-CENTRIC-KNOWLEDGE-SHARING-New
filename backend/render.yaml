# render.yaml – Render deployment manifest
# Docs: https://render.com/docs/yaml-spec

services:
  - type: web
    name: corn-ai-backend
    env: python
    region: oregon          # change to "frankfurt" or "singapore" as needed
    plan: free              # upgrade to "starter" or higher for production

    # ── Source ──────────────────────────────────────────────────────────────
    # All build / start commands run with backend/ as the working directory.
    rootDir: backend

    # ── Build ────────────────────────────────────────────────────────────────
    # Step 1 – install Python dependencies
    # Step 2 – download the large model binaries from cloud storage.
    #   Set TF_MODEL_URL and YIELD_MODEL_URL on the Render dashboard.
    #   The script is idempotent: it skips files that are already valid.
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python scripts/download_models.py

    # ── Start ────────────────────────────────────────────────────────────────
    # $PORT is injected automatically by Render at runtime.
    # Use "python -m uvicorn" so Python's own module runner is used instead of
    # the shell-path "uvicorn" binary, which may not be on PATH (exit 127).
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT

    # ── Health check ─────────────────────────────────────────────────────────
    # Render polls this after every deploy; a non-200 fails the rollout.
    # The /health body now includes tf_diagnostics for instant diagnosis.
    healthCheckPath: /health

    # ── Environment variables ────────────────────────────────────────────────
    envVars:
      # CORS – comma-separated list of allowed origins, or "*" for open dev.
      - key: ALLOWED_ORIGINS
        value: "*"

      # ── Model paths (relative to backend/; resolved via BASE_DIR in config.py)
      - key: TF_MODEL_PATH
        value: models/corn_final_model.h5
      - key: YIELD_MODEL_PATH
        value: corn_yield_model.pkl

      # ── Model download URLs (set these on the Render dashboard) ─────────────
      # Paste a direct-download link to the model binary. Supported sources:
      #   • Any public HTTPS URL (CDN, S3, Azure Blob, etc.)
      #   • Google Drive share link  (auto-rewritten to uc?export=download)
      #   • Dropbox share link       (?dl=0 auto-rewritten to ?dl=1)
      #   • Hugging Face resolve URL
      #
      # Leave the value blank or remove the key to skip the download.
      # If the file is missing the affected endpoint returns HTTP 503.
      - key: TF_MODEL_URL
        value: ""   # ← REPLACE with your hosted .h5 URL on the Render dashboard
      - key: YIELD_MODEL_URL
        value: ""   # ← REPLACE with your hosted .pkl URL on the Render dashboard
