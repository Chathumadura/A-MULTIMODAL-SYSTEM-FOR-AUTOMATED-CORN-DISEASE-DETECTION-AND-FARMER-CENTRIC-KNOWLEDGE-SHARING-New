# render.yaml – Render deployment manifest (MUST live at the repo root)
# Docs: https://render.com/docs/yaml-spec

services:
  - type: web
    name: corn-ai-backend
    env: python
    region: oregon          # alternatives: "frankfurt" | "singapore" | "ohio"
    plan: free              # 512 MB RAM; upgrade to "starter" for production

    # ── Source ──────────────────────────────────────────────────────────────
    # rootDir tells Render to treat backend/ as the working directory for
    # BOTH the build and start commands, so paths like "main:app" and
    # "requirements.txt" resolve correctly without any path prefixes.
    rootDir: backend

    # ── Build ────────────────────────────────────────────────────────────────
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python scripts/download_models.py

    # ── Start ────────────────────────────────────────────────────────────────
    # "python -m uvicorn" invokes uvicorn via Python's module runner, which
    # does NOT rely on the shell finding the "uvicorn" binary on $PATH.
    # This is the correct fix for "exit 127 / command not found" errors that
    # occur when gunicorn or a bare "uvicorn" call is used instead.
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT

    # ── Health check ─────────────────────────────────────────────────────────
    healthCheckPath: /health

    # ── Environment variables ────────────────────────────────────────────────
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*"

      # ── Model local paths (relative to backend/ which is rootDir) ─────────────
      # These tell the app where to save / load each file on the Render disk.
      - key: TF_MODEL_PATH
        value: models/corn_final_model.tflite
      - key: PEST_MODEL_PATH
        value: models/pest_model.tflite
      - key: YIELD_MODEL_PATH
        value: corn_yield_model.pkl
      - key: DISEASE_MODEL_PATH
        value: models/disease_model.keras

      # ── Model download URLs ──────────────────────────────────────────────────
      # IMPORTANT: do NOT set value: "" here – Render would push that empty
      # string to the service on every deploy, overwriting any URL you set on
      # the dashboard.  Use sync: false so that the value lives only on the
      # dashboard (Environment tab) and is never clobbered by this file.
      #
      # On the Render dashboard set each key to a direct-download URL:
      #   TF_MODEL_URL      → corn_final_model.tflite
      #   PEST_MODEL_URL    → pest_model.tflite
      #   YIELD_MODEL_URL   → corn_yield_model.pkl
      #   DISEASE_MODEL_URL → disease_model.keras
      #
      # Supported sources: any public HTTPS URL, Google Drive share link
      # (auto-rewritten), Dropbox share link (?dl=0 → ?dl=1), Hugging Face.
      - key: TF_MODEL_URL
        sync: false   # real URL must be set in Render dashboard → Environment tab
      - key: PEST_MODEL_URL
        sync: false   # real URL must be set in Render dashboard → Environment tab
      - key: YIELD_MODEL_URL
        sync: false   # real URL must be set in Render dashboard → Environment tab
      - key: DISEASE_MODEL_URL
        sync: false   # real URL must be set in Render dashboard → Environment tab

# ── Flutter Web Frontend ──────────────────────────────────────────────────────
  - type: web
    name: corn-ai-frontend
    env: static
    region: oregon

    # ── Build ────────────────────────────────────────────────────────────────
    # 1. Install the Flutter stable SDK (git clone gives us the latest stable)
    # 2. Build the Flutter web app in release mode, wiring it to the Render
    #    backend via --dart-define=RUN_MODE=production
    buildCommand: |
      git clone https://github.com/flutter/flutter.git -b stable --depth 1 $HOME/flutter
      export PATH="$HOME/flutter/bin:$PATH"
      flutter config --no-analytics --no-cli-animations
      flutter precache --web
      cd frontend/corn_app
      flutter pub get
      flutter build web --release --dart-define=RUN_MODE=production

    # ── Publish dir ──────────────────────────────────────────────────────────
    # This is relative to the repo root (not rootDir, since we set none).
    staticPublishPath: frontend/corn_app/build/web

    # ── SPA routing ──────────────────────────────────────────────────────────
    # Flutter web uses a single index.html; rewrite all routes to it so that
    # deep-links (e.g. /yield, /diagnosis) don't return 404 on refresh.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
